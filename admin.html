<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blackstore — Panel Gerente</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #e8c14f; --gold-dark: #c9a33a; --black: #0a0a0a;
      --dark: #111; --dark2: #1a1a1a; --gray: #f5f5f3; --gray2: #ebebeb;
      --text: #1a1a1a; --text2: #555; --text3: #999; --white: #fff;
      --radius: 12px; --shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    body { font-family: 'Segoe UI', system-ui, Arial, sans-serif; background: var(--gray); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
      background: var(--black);
    }
    .login-box {
      background: var(--white); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-logo { font-size: 24px; font-weight: 800; letter-spacing: 5px; text-align: center; margin-bottom: 0.5rem; }
    .login-logo span { color: var(--gold); }
    .login-sub { text-align: center; font-size: 13px; color: var(--text3); margin-bottom: 2rem; }
    .login-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .login-input {
      width: 100%; padding: 12px 14px; border: 1px solid var(--gray2); border-radius: 8px;
      font-size: 14px; margin-bottom: 1rem; font-family: inherit;
    }
    .login-input:focus { outline: none; border-color: var(--black); }
    .login-btn {
      width: 100%; background: var(--black); color: var(--white); border: none;
      border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .login-btn:hover { background: #222; }
    .login-error { color: #e74c3c; font-size: 13px; margin-top: 0.75rem; text-align: center; display: none; }

    /* PANEL */
    #panel { display: none; }
    .topbar {
      background: var(--black); color: var(--white); padding: 0 2rem; height: 60px;
      display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .topbar-logo { font-size: 18px; font-weight: 800; letter-spacing: 4px; }
    .topbar-logo span { color: var(--gold); }
    .topbar-right { display: flex; align-items: center; gap: 1rem; }
    .topbar-user { font-size: 13px; color: #aaa; }
    .logout-btn {
      background: #222; color: #aaa; border: none; border-radius: 6px;
      padding: 7px 14px; font-size: 13px; cursor: pointer;
    }
    .logout-btn:hover { color: var(--white); }

    .admin-wrap { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .admin-title { font-size: 22px; font-weight: 700; }

    /* STATS CARDS */
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 2rem; }
    .stat-card {
      background: var(--white); border: 1px solid var(--gray2); border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
    }
    .stat-card-num { font-size: 28px; font-weight: 800; color: var(--black); }
    .stat-card-label { font-size: 12px; color: var(--text3); margin-top: 4px; }
    .stat-card.gold .stat-card-num { color: var(--gold-dark); }

    /* FILTROS */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .filter-btn {
      padding: 8px 18px; border-radius: 20px; border: 1px solid var(--gray2);
      background: var(--white); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }

    /* TABLA */
    .table-wrap { background: var(--white); border: 1px solid var(--gray2); border-radius: var(--radius); overflow: hidden; }
    .table-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--gray2); display: flex; justify-content: space-between; align-items: center; }
    .table-title { font-size: 15px; font-weight: 700; }
    .refresh-btn {
      background: var(--gray2); border: none; border-radius: 6px; padding: 7px 14px;
      font-size: 13px; cursor: pointer; font-weight: 600;
    }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--gray2); background: #fafafa; }
    td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid var(--gray2); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    /* BADGES ESTADO */
    .badge-estado {
      display: inline-block; padding: 4px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .estado-pendiente { background: #fff3cd; color: #856404; }
    .estado-confirmado { background: #d1ecf1; color: #0c5460; }
    .estado-enviado { background: #d4edda; color: #155724; }
    .estado-cancelado { background: #f8d7da; color: #721c24; }

    /* SELECT ESTADO */
    .estado-select {
      padding: 6px 10px; border: 1px solid var(--gray2); border-radius: 6px;
      font-size: 13px; font-family: inherit; cursor: pointer; background: var(--white);
    }

    /* DETALLE MODAL */
    .detail-overlay {
      position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center; padding: 1rem;
    }
    .detail-overlay.active { display: flex; }
    .detail-modal {
      background: var(--white); border-radius: 16px; width: 100%; max-width: 600px;
      max-height: 90vh; overflow-y: auto;
    }
    .detail-header {
      padding: 1.5rem; border-bottom: 1px solid var(--gray2);
      display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--white);
    }
    .detail-title { font-size: 18px; font-weight: 700; }
    .detail-body { padding: 1.5rem; }
    .detail-section { margin-bottom: 1.5rem; }
    .detail-section-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .detail-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
    .detail-row span:first-child { color: var(--text2); }
    .detail-row span:last-child { font-weight: 600; }
    .comprobante-link {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--gray); border-radius: 8px; padding: 10px 16px;
      text-decoration: none; color: var(--text); font-size: 14px; font-weight: 600;
    }
    .comprobante-link:hover { background: var(--gray2); }
    .close-btn {
      background: var(--gray2); border: none; border-radius: 50%;
      width: 36px; height: 36px; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text3); }
    .empty-icon { font-size: 48px; margin-bottom: 1rem; }
    .loading { text-align: center; padding: 3rem; color: var(--text3); font-size: 14px; }

    @media (max-width: 700px) {
      .topbar { padding: 0 1rem; }
      th:nth-child(3), td:nth-child(3),
      th:nth-child(5), td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginWrap" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">BLACK<span>STORE</span></div>
    <div class="login-sub">Panel de Gerente</div>
    <label class="login-label">Email</label>
    <input class="login-input" type="email" id="loginEmail" placeholder="gerente@blackstore.com">
    <label class="login-label">Contraseña</label>
    <input class="login-input" type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ══ PANEL ══ -->
<div id="panel">
  <div class="topbar">
    <div class="topbar-logo">BLACK<span>STORE</span> <span style="font-size:12px;font-weight:400;letter-spacing:1px;color:#666;margin-left:8px;">GERENTE</span></div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="admin-wrap">
    <div class="admin-header">
      <div class="admin-title">📦 Pedidos recibidos</div>
    </div>

    <!-- STATS -->
    <div class="stat-cards">
      <div class="stat-card"><div class="stat-card-num" id="statTotal">—</div><div class="stat-card-label">Total pedidos</div></div>
      <div class="stat-card"><div class="stat-card-num" id="statPendiente">—</div><div class="stat-card-label">Pendientes</div></div>
      <div class="stat-card"><div class="stat-card-num" id="statConfirmado">—</div><div class="stat-card-label">Confirmados</div></div>
      <div class="stat-card"><div class="stat-card-num" id="statEnviado">—</div><div class="stat-card-label">Enviados</div></div>
      <div class="stat-card gold"><div class="stat-card-num" id="statMonto">—</div><div class="stat-card-label">Monto total (₲)</div></div>
    </div>

    <!-- FILTROS -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('pendiente', this)">⏳ Pendientes</button>
      <button class="filter-btn" onclick="setFilter('confirmado', this)">✅ Confirmados</button>
      <button class="filter-btn" onclick="setFilter('enviado', this)">🚚 Enviados</button>
      <button class="filter-btn" onclick="setFilter('cancelado', this)">❌ Cancelados</button>
    </div>

    <!-- TABLA -->
    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title" id="tableTitle">Todos los pedidos</span>
        <button class="refresh-btn" onclick="loadPedidos()">↻ Actualizar</button>
      </div>
      <div id="tableBody">
        <div class="loading">Cargando pedidos...</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ MODAL DETALLE ══ -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-modal" onclick="event.stopPropagation()">
    <div class="detail-header">
      <span class="detail-title" id="detailTitle">Detalle del pedido</span>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<!-- ══ FIREBASE + LÓGICA ══ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, orderBy, query }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB15Y32QkVMCx2LvR8AK6UGlcesIUHs3-Y",
  authDomain: "blackstore-99034.firebaseapp.com",
  projectId: "blackstore-99034",
  storageBucket: "blackstore-99034.firebasestorage.app",
  messagingSenderId: "930634558088",
  appId: "1:930634558088:web:5b23568d24511797d94d3d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allPedidos = [];
let currentFilter = "todos";

// ── AUTH ──
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("loginWrap").style.display = "none";
    document.getElementById("panel").style.display = "block";
    document.getElementById("topbarUser").textContent = user.email;
    loadPedidos();
  } else {
    document.getElementById("loginWrap").style.display = "flex";
    document.getElementById("panel").style.display = "none";
  }
});

window.doLogin = async function() {
  const email = document.getElementById("loginEmail").value.trim();
  const pass = document.getElementById("loginPass").value;
  const errEl = document.getElementById("loginError");
  errEl.style.display = "none";
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    errEl.style.display = "block";
    errEl.textContent = "Email o contraseña incorrectos.";
  }
};

window.doLogout = async function() {
  await signOut(auth);
};

// ── CARGAR PEDIDOS ──
window.loadPedidos = async function() {
  document.getElementById("tableBody").innerHTML = '<div class="loading">Cargando pedidos...</div>';
  try {
    const q = query(collection(db, "pedidos"), orderBy("fecha", "desc"));
    const snap = await getDocs(q);
    allPedidos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats();
    renderTable();
  } catch(e) {
    document.getElementById("tableBody").innerHTML = '<div class="loading">Error al cargar. Verificá los permisos de Firestore.</div>';
    console.error(e);
  }
};

function updateStats() {
  const total = allPedidos.length;
  const pendiente = allPedidos.filter(p => p.estado === "pendiente").length;
  const confirmado = allPedidos.filter(p => p.estado === "confirmado").length;
  const enviado = allPedidos.filter(p => p.estado === "enviado").length;
  const monto = allPedidos.reduce((s, p) => s + (p.total || 0), 0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statPendiente").textContent = pendiente;
  document.getElementById("statConfirmado").textContent = confirmado;
  document.getElementById("statEnviado").textContent = enviado;
  document.getElementById("statMonto").textContent = "₲ " + monto.toLocaleString("es-PY");
}

function formatPrice(n) { return "₲ " + (n || 0).toLocaleString("es-PY"); }

function formatFecha(ts) {
  if (!ts) return "—";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString("es-PY", { day: "2-digit", month: "2-digit", year: "numeric" })
    + " " + d.toLocaleTimeString("es-PY", { hour: "2-digit", minute: "2-digit" });
}

window.setFilter = function(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const labels = { todos: "Todos los pedidos", pendiente: "Pedidos pendientes", confirmado: "Pedidos confirmados", enviado: "Pedidos enviados", cancelado: "Pedidos cancelados" };
  document.getElementById("tableTitle").textContent = labels[filter];
  renderTable();
};

function renderTable() {
  const filtered = currentFilter === "todos" ? allPedidos : allPedidos.filter(p => p.estado === currentFilter);
  const tbody = document.getElementById("tableBody");
  if (filtered.length === 0) {
    tbody.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No hay pedidos en esta categoría</p></div>';
    return;
  }
  tbody.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Cliente</th>
          <th>Ciudad</th>
          <th>Total</th>
          <th>Fecha</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map((p, i) => `
          <tr>
            <td style="color:var(--text3);font-size:12px;">${filtered.length - i}</td>
            <td>
              <div style="font-weight:600;">${p.cliente?.nombre || ""} ${p.cliente?.apellido || ""}</div>
              <div style="font-size:12px;color:var(--text3);">${p.cliente?.tel || ""}</div>
            </td>
            <td style="color:var(--text2);">${p.cliente?.ciudad || "—"}</td>
            <td style="font-weight:700;">${formatPrice(p.total)}</td>
            <td style="font-size:12px;color:var(--text3);">${formatFecha(p.fecha)}</td>
            <td>
              <select class="estado-select" onchange="cambiarEstado('${p.id}', this.value)">
                <option value="pendiente" ${p.estado === "pendiente" ? "selected" : ""}>⏳ Pendiente</option>
                <option value="confirmado" ${p.estado === "confirmado" ? "selected" : ""}>✅ Confirmado</option>
                <option value="enviado" ${p.estado === "enviado" ? "selected" : ""}>🚚 Enviado</option>
                <option value="cancelado" ${p.estado === "cancelado" ? "selected" : ""}>❌ Cancelado</option>
              </select>
            </td>
            <td>
              <button onclick="verDetalle('${p.id}')" style="background:var(--black);color:var(--white);border:none;border-radius:6px;padding:7px 14px;font-size:13px;cursor:pointer;">Ver</button>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>`;
}

// ── CAMBIAR ESTADO ──
window.cambiarEstado = async function(id, nuevoEstado) {
  try {
    await updateDoc(doc(db, "pedidos", id), { estado: nuevoEstado });
    const p = allPedidos.find(x => x.id === id);
    if (p) p.estado = nuevoEstado;
    updateStats();
  } catch(e) {
    alert("Error al actualizar el estado.");
    console.error(e);
  }
};

// ── VER DETALLE ──
window.verDetalle = function(id) {
  const p = allPedidos.find(x => x.id === id);
  if (!p) return;
  document.getElementById("detailTitle").textContent = `Pedido de ${p.cliente?.nombre} ${p.cliente?.apellido}`;
  const productosHtml = (p.productos || []).map(pr => `
    <div class="detail-row">
      <span>${pr.nombre} × ${pr.cantidad}</span>
      <span>${formatPrice(pr.subtotal)}</span>
    </div>`).join("");
  document.getElementById("detailBody").innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">Cliente</div>
      <div class="detail-row"><span>Nombre</span><span>${p.cliente?.nombre} ${p.cliente?.apellido}</span></div>
      <div class="detail-row"><span>WhatsApp</span>
        <span><a href="https://wa.me/595${(p.cliente?.tel||'').replace(/\D/g,'')}" target="_blank" style="color:var(--gold-dark);">📲 ${p.cliente?.tel}</a></span>
      </div>
      <div class="detail-row"><span>Ciudad</span><span>${p.cliente?.ciudad || "—"}</span></div>
      <div class="detail-row"><span>Método de pago</span><span>${p.cliente?.pago || "—"}</span></div>
      ${p.cliente?.notas ? `<div class="detail-row"><span>Notas</span><span>${p.cliente.notas}</span></div>` : ""}
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Productos</div>
      ${productosHtml}
      <div style="border-top:1px solid var(--gray2);margin-top:10px;padding-top:10px;">
        <div class="detail-row"><span style="font-weight:700;">Total</span><span style="font-weight:800;font-size:16px;">${formatPrice(p.total)}</span></div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Comprobante de pago</div>
      ${p.comprobante
        ? `<a class="comprobante-link" href="${p.comprobante}" target="_blank" download="${p.comprobanteNombre || 'comprobante'}">
             ${p.comprobanteTipo && p.comprobanteTipo.includes('pdf') ? '📄' : '🖼️'} ${p.comprobanteNombre || "Ver comprobante"}
           </a>
           ${p.comprobanteTipo && !p.comprobanteTipo.includes('pdf')
             ? `<div style="margin-top:12px;"><img src="${p.comprobante}" alt="Comprobante" style="max-width:100%;border-radius:8px;border:1px solid var(--gray2);"></div>`
             : ''}`
        : `<span style="font-size:14px;color:var(--text3);">Sin comprobante adjunto</span>`}
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Estado del pedido</div>
      <select class="estado-select" onchange="cambiarEstado('${p.id}', this.value)" style="width:100%;padding:12px;">
        <option value="pendiente" ${p.estado==="pendiente"?"selected":""}>⏳ Pendiente</option>
        <option value="confirmado" ${p.estado==="confirmado"?"selected":""}>✅ Confirmado</option>
        <option value="enviado" ${p.estado==="enviado"?"selected":""}>🚚 Enviado</option>
        <option value="cancelado" ${p.estado==="cancelado"?"selected":""}>❌ Cancelado</option>
      </select>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Fecha del pedido</div>
      <div style="font-size:14px;">${formatFecha(p.fecha)}</div>
    </div>`;
  document.getElementById("detailOverlay").classList.add("active");
};

window.closeDetail = function(e) {
  if (!e || e.target === document.getElementById("detailOverlay")) {
    document.getElementById("detailOverlay").classList.remove("active");
  }
};
</script>
</body>
</html>
