<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackCasino — Plataforma Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700;900&family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --pink:#ff1a6d;--pink2:#ff4d8d;--pink-glow:rgba(255,26,109,.25);
  --gold:#f5a623;--gold2:#ffd166;--gold-glow:rgba(245,166,35,.2);
  --green:#00e676;--red:#ff3d5a;--blue:#2979ff;
  --bg:#060608;--bg2:#0c0c10;--bg3:#111118;
  --card:#12121a;--card2:#1a1a26;--card3:#202030;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.10);
  --border-pink:rgba(255,26,109,.3);
  --text:#f0f0f8;--muted:#5a5a7a;--muted2:#8888aa;
  --radius:14px;--radius-lg:20px;--radius-xl:28px;
}

body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* NOISE OVERLAY */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9998;opacity:.4;}

/* AMBIENT GLOW */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.ambient::before{content:'';position:absolute;top:-20%;left:-10%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(255,26,109,.08) 0%,transparent 70%);animation:drift1 12s ease-in-out infinite alternate;}
.ambient::after{content:'';position:absolute;bottom:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(ellipse,rgba(41,121,255,.06) 0%,transparent 70%);animation:drift2 15s ease-in-out infinite alternate;}
@keyframes drift1{from{transform:translate(0,0)}to{transform:translate(5%,5%)}}
@keyframes drift2{from{transform:translate(0,0)}to{transform:translate(-5%,-5%)}}

/* LOADING */
#loadingScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;transition:opacity .6s;}
.loading-brand{display:flex;flex-direction:column;align-items:center;gap:8px;}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:4px;color:var(--text);line-height:1;}
.loading-logo span{color:var(--pink);text-shadow:0 0 30px var(--pink-glow);}
.loading-tagline{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
.loading-track{width:240px;height:1px;background:rgba(255,255,255,.08);border-radius:1px;position:relative;overflow:hidden;}
.loading-track::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,var(--pink),transparent);animation:sweep 1.8s ease-in-out forwards;}
@keyframes sweep{from{left:-100%}to{left:100%}}
.loading-pct{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--pink);margin-top:8px;}

/* WRAPPER */
#appWrapper{position:relative;z-index:1;width:100%;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* LOGIN */
#loginPage{flex:1;display:none;align-items:center;justify-content:center;padding:24px 20px;flex-direction:column;gap:0;}
.login-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-xl);padding:40px 36px;width:100%;max-width:380px;position:relative;overflow:hidden;}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--pink),transparent);}
.login-brand{text-align:center;margin-bottom:32px;}
.brand-logo{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:3px;line-height:1;}
.brand-logo span{color:var(--pink);}
.brand-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:4px;margin-top:4px;}
.tab-row{display:flex;background:var(--bg2);border-radius:var(--radius);padding:3px;border:1px solid var(--border);margin-bottom:28px;}
.tab-btn{flex:1;padding:9px;background:transparent;border:none;color:var(--muted2);font-size:13px;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer;border-radius:11px;transition:all .2s;letter-spacing:.5px;}
.tab-btn.active{background:var(--card2);color:var(--pink);box-shadow:0 2px 12px rgba(0,0,0,.3);}
.lf{display:none;}.lf.active{display:block;}
.field-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;margin-top:16px;display:block;}
.field-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);padding:12px 16px;font-size:14px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .2s;appearance:none;}
.field-input:focus{border-color:var(--pink);}
.field-input::placeholder{color:var(--muted);}
.pw-wrap{position:relative;}
.pw-wrap .field-input{padding-right:44px;}
.pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px;}
.err-msg{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--red);margin-top:10px;min-height:16px;}
.btn-primary{width:100%;margin-top:22px;padding:14px;background:var(--pink);color:#fff;font-weight:900;font-size:15px;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;border:none;border-radius:var(--radius);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.btn-primary::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s;}
.btn-primary:hover::after{background:rgba(255,255,255,.08);}
.btn-primary:active{transform:scale(.98);}
.deposit-link{text-align:center;margin-top:18px;}
.deposit-link a{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);cursor:pointer;letter-spacing:1px;}
.deposit-link a:hover{text-decoration:underline;}

/* CASINO LAYOUT */
#casinoPage{flex:1;display:none;flex-direction:column;padding-bottom:72px;}

/* HEADER */
.site-header{position:sticky;top:0;z-index:200;background:rgba(6,6,8,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;}
.hdr-logo span{color:var(--pink);}
.hdr-actions{display:flex;align-items:center;gap:8px;}
.balance-chip{background:var(--card2);border:1px solid var(--border2);border-radius:100px;padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;display:flex;align-items:center;gap:6px;}
.balance-chip .amt{color:var(--pink);font-weight:700;}
.hdr-btn{background:transparent;border:1px solid var(--border2);color:var(--muted2);border-radius:9px;padding:6px 12px;font-size:11px;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer;transition:all .2s;letter-spacing:.5px;}
.hdr-btn:hover{border-color:var(--border-pink);color:var(--pink);}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse-dot 2s infinite;}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.5}}

/* SEARCH BAR */
.search-bar{padding:10px 16px;}
.search-inner{display:flex;gap:8px;}
.search-box{flex:1;position:relative;}
.search-box input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 14px 10px 40px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .2s;}
.search-box input:focus{border-color:var(--border-pink);}
.search-box::before{content:'⌕';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--muted);line-height:1;}
.filter-btn{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);color:var(--muted2);padding:10px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;white-space:nowrap;transition:all .2s;}
.filter-btn:hover{border-color:var(--border-pink);color:var(--pink);}

/* NAV */
.main-nav{display:flex;gap:0;overflow-x:auto;padding:0 12px 1px;scrollbar-width:none;}
.main-nav::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;padding:10px 16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted2);font-size:12px;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap;letter-spacing:.5px;}
.nav-btn.active{color:var(--pink);border-bottom-color:var(--pink);}
.nav-btn:hover{color:var(--text);}

/* CONTENT */
.main-content{padding:16px;}

/* SECTION HEADERS */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;}
.sec-title span{color:var(--pink);}
.btn-see-all{background:transparent;border:1px solid var(--border2);border-radius:100px;color:var(--muted2);font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:5px 14px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn-see-all:hover{border-color:var(--pink);color:var(--pink);}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 12px;text-align:center;position:relative;overflow:hidden;}
.stat-box::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--border);}
.stat-box.accent::after{background:var(--pink);}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;}
.stat-val.pink{color:var(--pink);}

/* PROMO BANNERS */
.promos{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;margin-bottom:28px;padding-bottom:4px;}
.promos::-webkit-scrollbar{display:none;}
.promo-card{flex-shrink:0;width:210px;height:120px;border-radius:var(--radius-lg);border:1px solid var(--border2);cursor:pointer;position:relative;overflow:hidden;transition:transform .2s;}
.promo-card:hover{transform:translateY(-2px);}
.promo-card .pc-bg{position:absolute;inset:0;}
.promo-simpleplay .pc-bg{background:linear-gradient(135deg,#1a0a2e 0%,#4c1d95 100%);}
.promo-aviator .pc-bg{background:linear-gradient(135deg,#1a0505 0%,#7f1d1d 100%);}
.promo-pragmatic .pc-bg{background:linear-gradient(135deg,#061428 0%,#0f3460 100%);}
.promo-evolution .pc-bg{background:linear-gradient(135deg,#041a0a 0%,#065f2e 100%);}
.promo-card .pc-content{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;}
.pc-badge{display:inline-block;background:var(--pink);font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:100px;margin-bottom:6px;letter-spacing:1px;}
.pc-badge.gold{background:var(--gold);color:#000;}
.pc-badge.blue{background:var(--blue);}
.pc-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;}
.pc-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.5);margin-top:2px;}

/* GAME CAROUSEL */
.carousel-section{margin-bottom:28px;}
.carousel-wrap{position:relative;}
.carousel{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;scroll-behavior:smooth;padding-bottom:2px;}
.carousel::-webkit-scrollbar{display:none;}
.carousel-arrow{position:absolute;top:50%;transform:translateY(-60%);z-index:10;background:var(--card2);border:1px solid var(--border2);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:16px;transition:all .2s;}
.carousel-arrow:hover{background:var(--pink);border-color:var(--pink);}
.carousel-arrow.left{left:-8px;}
.carousel-arrow.right{right:-8px;}

/* GAME CARD */
.gc{flex-shrink:0;width:136px;border-radius:var(--radius);overflow:hidden;cursor:pointer;background:var(--card);border:1px solid var(--border);transition:all .2s;position:relative;}
.gc:hover{transform:translateY(-3px);border-color:var(--border-pink);box-shadow:0 8px 24px rgba(255,26,109,.12);}
.gc-thumb{width:136px;height:104px;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;}
.gc-badge{position:absolute;top:8px;left:8px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:100px;letter-spacing:1px;}
.gc-badge.hot{background:var(--pink);color:#fff;}
.gc-badge.new{background:var(--gold);color:#000;}
.gc-badge.live{background:var(--red);color:#fff;}
.gc-info{padding:10px 10px 12px;}
.gc-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;}
.gc-prov{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2);margin-top:3px;}

/* INTERNAL GAMES */
.games-container{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:20px;margin-bottom:24px;}
.games-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.games-label::before{content:'';flex:1;height:1px;background:var(--border);}
.games-label::after{content:'';flex:1;height:1px;background:var(--border);}
.game-switcher{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:20px;}
.gsw-btn{padding:10px 4px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--muted2);font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;cursor:pointer;transition:all .2s;text-align:center;line-height:1.3;}
.gsw-btn .gi{display:block;font-size:18px;margin-bottom:3px;}
.gsw-btn.active{background:var(--card3);border-color:var(--border-pink);color:var(--pink);}
.game-panel{display:none;animation:fadeIn .25s ease;}
.game-panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* FIELD - PENALES */
.field{background:linear-gradient(180deg,#0d3d1e 0%,#0f4a23 50%,#0d3d1e 100%);border:1px solid #1a6e35;border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;position:relative;min-height:230px;overflow:hidden;}
.field-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:30px 30px;}
.goal-post{width:170px;height:76px;border:3px solid rgba(255,255,255,.8);border-bottom:none;border-radius:6px 6px 0 0;margin:0 auto 8px;position:relative;background:rgba(255,255,255,.03);}
.keeper-zone{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:center;height:76px;}
#keeperEl{width:54px;height:70px;position:absolute;bottom:0;left:calc(50% - 27px);transition:left .35s cubic-bezier(.4,0,.2,1);}
.kp-head{position:absolute;top:0;left:18px;width:18px;height:18px;border-radius:50%;background:#f5c5a3;border:2px solid rgba(255,255,255,.9);}
.kp-body{position:absolute;top:17px;left:13px;width:28px;height:36px;border-radius:12px 12px 8px 8px;background:linear-gradient(180deg,#2196f3,#1565c0);border:2px solid rgba(255,255,255,.8);}
.kp-body::after{content:'';position:absolute;left:10px;top:5px;width:5px;height:24px;border-radius:4px;background:rgba(255,255,255,.9);}
.kp-arm{position:absolute;top:25px;width:20px;height:8px;border-radius:999px;background:#1565c0;border:2px solid rgba(255,255,255,.7);}
.kp-arm.left{left:0;transform:rotate(-20deg);transform-origin:right center;}
.kp-arm.right{right:0;transform:rotate(20deg);transform-origin:left center;}
.kp-leg{position:absolute;bottom:0;width:10px;height:20px;border-radius:0 0 8px 8px;background:#111;border:1px solid rgba(255,255,255,.3);}
.kp-leg.left{left:15px;transform:rotate(5deg);}
.kp-leg.right{right:15px;transform:rotate(-5deg);}
.ball-zone{display:flex;justify-content:center;margin:8px 0;height:58px;position:relative;}
#ballEl{width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 32% 28%,#fff 0%,#e0e0e0 70%);box-shadow:inset -3px -3px 0 #bdbdbd,2px 4px 12px rgba(0,0,0,.5);position:absolute;left:calc(50% - 27px);top:0;transition:all .45s cubic-bezier(.4,0,.2,1);}
.penalty-spot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);margin:4px auto 0;}
.field-flash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s;pointer-events:none;}
.field-flash.show{opacity:1;}
.flash-text{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:3px;text-shadow:0 0 30px currentColor;}
.flash-text.goal{color:#4caf50;}
.flash-text.saved{color:var(--red);}

.dir-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.dir-btn{padding:14px 4px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:20px;cursor:pointer;transition:all .15s;font-family:'Barlow',sans-serif;text-align:center;}
.dir-btn:hover:not(:disabled){background:var(--card3);border-color:var(--border-pink);}
.dir-btn:active:not(:disabled){transform:scale(.96);}
.dir-btn:disabled{opacity:.25;cursor:not-allowed;}
.dir-lbl{display:block;font-size:10px;color:var(--muted2);margin-top:3px;font-weight:700;letter-spacing:.5px;}
.bet-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.bet-row .field-label{margin:0;white-space:nowrap;flex-shrink:0;}
.bet-row .field-input{flex:1;}
.btn-action{width:100%;padding:14px;font-weight:900;font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:2px;border:none;border-radius:var(--radius);cursor:pointer;transition:all .2s;margin-bottom:10px;}
.btn-action.primary{background:var(--pink);color:#fff;}
.btn-action.primary:hover:not(:disabled){background:#e5005d;}
.btn-action.secondary{background:transparent;border:1px solid var(--gold);color:var(--gold);}
.btn-action.secondary:hover:not(:disabled){background:rgba(245,166,35,.08);}
.btn-action:disabled{background:var(--bg2);color:var(--muted);border:1px solid var(--border);cursor:not-allowed;}
.history-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.h-tick{width:34px;height:34px;border-radius:8px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:17px;}
.result-text{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted2);min-height:18px;}

/* SLOTS */
.slots-machine{background:linear-gradient(135deg,#100820 0%,#1a0f35 100%);border:1px solid #3d1d7a;border-radius:var(--radius-lg);padding:24px;margin-bottom:14px;position:relative;}
.slots-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.slots-brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#c084fc;}
.slots-lights{display:flex;gap:6px;}
.sl-dot{width:10px;height:10px;border-radius:50%;animation:blink-l 1s infinite alternate;}
.sl-dot:nth-child(1){background:#fbbf24;box-shadow:0 0 8px #fbbf24;}
.sl-dot:nth-child(2){background:var(--red);box-shadow:0 0 8px var(--red);animation-delay:.2s;}
.sl-dot:nth-child(3){background:#22c55e;box-shadow:0 0 8px #22c55e;animation-delay:.4s;}
.sl-dot:nth-child(4){background:#3b82f6;box-shadow:0 0 8px #3b82f6;animation-delay:.6s;}
@keyframe
