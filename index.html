<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackcasino</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pink:#e91e8c;--pink2:#ff2d9b;--pink-dark:#b5166e;--gold:#f59e0b;--red:#ef4444;--bg:#080808;--card:#111;--card2:#161616;--border:#1f1f1f;--border2:#2a2a2a;--text:#fff;--muted:#555;--muted2:#888;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(233,30,140,.07) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* LOADING */
#loadingScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.loading-logo{font-size:40px;font-weight:800;letter-spacing:-2px;}.loading-logo span{color:var(--pink);}
.loading-bar{width:200px;height:2px;background:#222;border-radius:2px;overflow:hidden;}
.loading-bar-inner{height:100%;background:var(--pink);animation:loadBar 1.5s ease forwards;}
@keyframes loadBar{from{width:0}to{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* LOGIN */
#login{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:44px 48px;width:380px;text-align:center;position:relative;z-index:1;animation:fadeUp .4s ease;display:none;margin:auto;}
.logo{font-size:32px;font-weight:800;letter-spacing:-1.5px;margin-bottom:4px;}.logo span{color:var(--pink);}
.sub{color:var(--muted);font-size:12px;margin-bottom:28px;letter-spacing:1px;text-transform:uppercase;font-family:'Space Mono',monospace;}
.login-tabs{display:flex;margin-bottom:24px;background:#0d0d0d;border-radius:10px;padding:4px;border:1px solid var(--border);}
.login-tab{flex:1;padding:9px;background:none;border:none;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;border-radius:8px;transition:all .2s;font-family:'Syne',sans-serif;}
.login-tab.active{background:var(--card2);color:var(--pink);}
.login-form{display:none;}.login-form.active{display:block;}
label{display:block;text-align:left;font-size:11px;color:var(--muted2);margin-bottom:5px;margin-top:14px;text-transform:uppercase;letter-spacing:.5px;font-family:'Space Mono',monospace;}
input[type=text],input[type=email],input[type=password],input[type=number]{width:100%;background:#0d0d0d;border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:11px 14px;font-size:14px;outline:none;transition:border-color .2s;font-family:'Syne',sans-serif;}
input:focus{border-color:var(--pink);}input::placeholder{color:var(--muted);}
.pass-wrap{position:relative;}.pass-wrap input{padding-right:42px;}
.toggle-pass{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;}
.btn-login{width:100%;margin-top:22px;padding:13px;background:var(--pink);color:#fff;font-weight:800;font-size:15px;border:none;border-radius:10px;cursor:pointer;transition:background .2s,transform .1s;font-family:'Syne',sans-serif;}
.btn-login:hover{background:var(--pink-dark);}.btn-login:active{transform:scale(.98);}
.err{color:var(--red);font-size:12px;margin-top:10px;min-height:16px;font-family:'Space Mono',monospace;}
.creditos-link{font-size:12px;color:var(--gold);cursor:pointer;display:inline-block;margin-top:14px;font-family:'Space Mono',monospace;}
.creditos-link:hover{text-decoration:underline;}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal.show{display:flex;}
.modal-content{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;max-width:500px;width:92%;max-height:85vh;overflow-y:auto;animation:fadeUp .25s ease;}
.modal-content h2{font-size:20px;font-weight:800;margin-bottom:16px;color:var(--pink);}
.modal-content p{font-size:13px;color:#aaa;line-height:1.7;margin-bottom:12px;}
.metodo{background:#0d0d0d;border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.metodo .titulo{color:var(--pink);font-weight:700;margin-bottom:6px;font-size:13px;}
.metodo .detalle{color:#888;font-size:12px;font-family:'Space Mono',monospace;}
.btn-close{width:100%;padding:12px;background:#222;color:var(--text);border:none;border-radius:10px;font-size:14px;cursor:pointer;margin-top:16px;font-family:'Syne',sans-serif;font-weight:700;}
.btn-close:hover{background:#2a2a2a;}

/* CASINO MAIN */
#casino{display:none;width:100%;max-width:480px;margin:0 auto;text-align:left;position:relative;z-index:1;padding-bottom:80px;}

/* TOP HEADER */
.top-header{position:sticky;top:0;z-index:100;background:rgba(8,8,8,.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:10px 16px 0;}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo-header{font-size:22px;font-weight:800;letter-spacing:-1px;}.logo-header span{color:var(--pink);}
.header-right{display:flex;align-items:center;gap:8px;}
.btn-logout,.btn-profile{background:none;border:1px solid var(--border2);color:var(--muted2);border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;transition:all .2s;}
.btn-logout:hover,.btn-profile:hover{border-color:#555;color:var(--text);}
.btn-profile{display:inline-flex;align-items:center;gap:6px;}
.btn-profile::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--pink);box-shadow:0 0 10px rgba(233,30,140,.7);}
.balance-pill{background:#0d0d0d;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'Space Mono',monospace;color:#fff;}
.balance-pill span{color:var(--pink);font-weight:700;}

/* SEARCH */
.search-row{display:flex;gap:8px;margin-bottom:10px;}
.search-wrap{flex:1;position:relative;}
.search-wrap input{width:100%;background:#0d0d0d;border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:9px 14px 9px 36px;font-size:13px;outline:none;font-family:'Syne',sans-serif;}
.search-wrap input:focus{border-color:var(--pink);}
.search-wrap::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.5;}
.btn-provider{background:#0d0d0d;border:1px solid var(--border2);border-radius:10px;color:var(--muted2);padding:9px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Syne',sans-serif;transition:all .2s;}
.btn-provider:hover{border-color:var(--pink);color:var(--pink);}

/* NAV TABS */
.nav-tabs{display:flex;gap:0;overflow-x:auto;padding-bottom:1px;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{flex-shrink:0;padding:8px 16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted2);font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;white-space:nowrap;}
.nav-tab.active{color:var(--pink);border-bottom-color:var(--pink);}
.nav-tab:hover{color:var(--text);}

/* CONTENT */
.content{padding:16px;}

/* BANNERS */
.banners-section{margin-bottom:24px;}
.section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin-bottom:12px;}
.banners-carousel{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.banners-carousel::-webkit-scrollbar{display:none;}
.banner-card{flex-shrink:0;width:200px;height:110px;border-radius:14px;overflow:hidden;position:relative;cursor:pointer;border:1px solid var(--border2);}
.banner-simpleplay{background:linear-gradient(135deg,#1a0a2e,#4c1d95);}
.banner-aviator{background:linear-gradient(135deg,#1a0505,#7f1d1d);}
.banner-pragmatic{background:linear-gradient(135deg,#0a1628,#1d4ed8);}
.banner-card .ban-logo{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.ban-icon{font-size:36px;}
.ban-name{font-size:13px;font-weight:800;letter-spacing:1px;}
.ban-tag{font-size:10px;background:rgba(255,255,255,.15);border-radius:20px;padding:2px 10px;font-family:'Space Mono',monospace;}
.banner-simpleplay .ban-name{color:#c084fc;}
.banner-aviator .ban-name{color:#fca5a5;}
.banner-pragmatic .ban-name{color:#60a5fa;}
.banner-card .ban-hot{position:absolute;top:8px;right:8px;background:var(--pink);color:#fff;font-size:9px;font-weight:800;border-radius:20px;padding:2px 8px;font-family:'Space Mono',monospace;}
.dots{display:flex;justify-content:center;gap:6px;margin-top:8px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border2);cursor:pointer;transition:all .2s;}
.dot.active{background:var(--pink);width:16px;border-radius:3px;}

/* GAMES SLIDER */
.games-section{margin-bottom:24px;}
.games-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.games-title{font-size:15px;font-weight:800;}
.btn-all{background:none;border:1px solid var(--border2);border-radius:20px;color:var(--pink);font-size:11px;font-weight:800;padding:4px 14px;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;}
.btn-all:hover{background:var(--pink);color:#fff;}
.games-carousel-wrap{position:relative;}
.games-carousel{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;scroll-behavior:smooth;}
.games-carousel::-webkit-scrollbar{display:none;}
.game-card{flex-shrink:0;width:130px;border-radius:14px;overflow:hidden;cursor:pointer;background:var(--card);border:1px solid var(--border);transition:transform .2s,border-color .2s;position:relative;}
.game-card:hover{transform:scale(1.03);border-color:var(--pink);}
.game-img{width:130px;height:100px;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:36px;}
.game-img-egypt{background:linear-gradient(135deg,#78350f,#1a0a00);}
.game-img-joker{background:linear-gradient(135deg,#1e1b4b,#4c1d95);}
.game-img-mustang{background:linear-gradient(135deg,#14532d,#052e16);}
.game-img-celestial{background:linear-gradient(135deg,#0c4a6e,#083344);}
.game-img-irish{background:linear-gradient(135deg,#166534,#14532d);}
.game-img-balloon{background:linear-gradient(135deg,#831843,#500724);}
.game-info{padding:8px;}
.game-name{font-size:11px;font-weight:700;line-height:1.3;color:var(--text);}
.game-provider{font-size:10px;color:var(--muted2);font-family:'Space Mono',monospace;margin-top:2px;}
.game-hot{position:absolute;top:6px;left:6px;background:var(--pink);color:#fff;font-size:9px;font-weight:800;border-radius:20px;padding:2px 8px;}
.game-new{position:absolute;top:6px;left:6px;background:var(--gold);color:#000;font-size:9px;font-weight:800;border-radius:20px;padding:2px 8px;}
.arrow-btn{position:absolute;top:50%;transform:translateY(-60%);background:rgba(0,0,0,.8);border:1px solid var(--border2);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:14px;z-index:10;transition:all .2s;}
.arrow-btn:hover{background:var(--pink);border-color:var(--pink);}
.arrow-left{left:-6px;}.arrow-right{right:-6px;}

/* PROVIDER SECTION */
.provider-section{margin-bottom:24px;}
.provider-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.provider-logo{background:linear-gradient(135deg,#0a1628,#1d4ed8);border-radius:10px;padding:6px 14px;font-size:12px;font-weight:800;color:#fff;letter-spacing:.5px;}
.provider-logo-pp{background:linear-gradient(135deg,#7c2d12,#b45309);}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 10px;}
.stat-card .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'Space Mono',monospace;}
.stat-card .val{font-size:18px;font-weight:800;}.stat-card .val.pink{color:var(--pink);}

/* GAME TABS */
.game-tabs{display:flex;gap:0;margin-bottom:16px;background:#0d0d0d;border-radius:12px;padding:4px;border:1px solid var(--border);}
.game-tab{flex:1;padding:8px 2px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;border-radius:9px;transition:all .2s;font-family:'Syne',sans-serif;line-height:1.2;}
.game-tab.active{background:var(--card2);color:var(--text);}
.game-panel{display:none;}.game-panel.active{display:block;}

/* PENALES */
.field{background:linear-gradient(180deg,#14532d 0%,#166534 100%);border:2px solid #15803d;border-radius:16px;padding:20px;margin-bottom:14px;position:relative;min-height:220px;overflow:hidden;}
.field::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 1px,transparent 28px),repeating-linear-gradient(90deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 1px,transparent 28px);}
.arco{width:160px;height:70px;border:4px solid rgba(255,255,255,.75);border-bottom:none;border-radius:8px 8px 0 0;margin:0 auto 10px;position:relative;background:rgba(255,255,255,.04);}
.arquero-wrap{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:center;height:70px;}
#arquero{width:52px;height:66px;position:absolute;bottom:0;left:calc(50% - 26px);transition:left .35s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 10px 10px rgba(0,0,0,.35));}
.keeper-head{position:absolute;top:0;left:17px;width:18px;height:18px;border-radius:50%;background:#f0c39b;border:2px solid rgba(255,255,255,.85);z-index:3;}
.keeper-body{position:absolute;top:18px;left:13px;width:26px;height:34px;border-radius:10px 10px 8px 8px;background:linear-gradient(180deg,#38bdf8,#1d4ed8);border:2px solid rgba(255,255,255,.9);z-index:2;}
.keeper-body::after{content:'';position:absolute;left:9px;top:5px;width:5px;height:22px;border-radius:4px;background:rgba(255,255,255,.85);}
.keeper-arm{position:absolute;top:24px;width:20px;height:8px;border-radius:999px;background:#0f64c8;border:2px solid rgba(255,255,255,.8);z-index:1;}
.keeper-arm.left{left:0;transform:rotate(-22deg);transform-origin:right center;}
.keeper-arm.right{right:0;transform:rotate(22deg);transform-origin:left center;}
.keeper-leg{position:absolute;bottom:0;width:9px;height:18px;border-radius:0 0 8px 8px;background:#101827;border:1px solid rgba(255,255,255,.45);}
.keeper-leg.left{left:16px;transform:rotate(7deg);}
.keeper-leg.right{right:16px;transform:rotate(-7deg);}
.balon-wrap{display:flex;justify-content:center;margin:10px 0 6px;height:56px;position:relative;}
#balon{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#f8fafc 0%,#e2e8f0 80%);box-shadow:inset -2px -2px 0 #9ca3af,inset 3px 3px 6px rgba(0,0,0,.3);position:absolute;transition:all .4s cubic-bezier(.4,0,.2,1);left:calc(50% - 26px);top:0;}
.penalty-line{width:60px;height:3px;background:rgba(255,255,255,.45);margin:0 auto;border-radius:2px;}
.field-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:30px;font-weight:900;text-shadow:0 2px 20px rgba(0,0,0,.9);pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
.field-msg.show{opacity:1;}.field-msg.gol{color:#4ade80;}.field-msg.ataj{color:var(--red);}
.dir-btns{display:flex;gap:8px;margin-bottom:12px;}
.btn-dir{flex:1;padding:14px 0;background:var(--card);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-size:22px;cursor:pointer;transition:background .15s,transform .1s;font-family:'Syne',sans-serif;}
.btn-dir:hover:not(:disabled){background:#1e1e1e;}.btn-dir:active:not(:disabled){transform:scale(.96);}
.btn-dir:disabled{opacity:.3;cursor:not-allowed;}
.btn-dir .dir-label{display:block;font-size:10px;color:var(--muted);margin-top:3px;}
.bet-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.bet-row label{font-size:12px;color:var(--muted2);white-space:nowrap;text-transform:uppercase;font-family:'Space Mono',monospace;margin-top:0;}
.bet-row input{flex:1;min-width:0;}
.btn-apostar{width:100%;padding:14px;background:var(--pink);color:#fff;font-weight:800;font-size:15px;border:none;border-radius:12px;cursor:pointer;margin-bottom:10px;transition:background .2s,transform .1s;font-family:'Syne',sans-serif;}
.btn-apostar:hover:not(:disabled){background:var(--pink-dark);}.btn-apostar:disabled{background:#1a1a1a;color:#444;cursor:not-allowed;}
.btn-retirar{width:100%;padding:14px;background:#0d0d0d;border:1px solid var(--gold);color:var(--gold);font-weight:800;font-size:15px;border-radius:12px;cursor:pointer;transition:background .2s;margin-bottom:14px;font-family:'Syne',sans-serif;}
.btn-retirar:hover:not(:disabled){background:#1a1200;}.btn-retirar:disabled{opacity:.3;cursor:not-allowed;}
.historial-title{font-size:11px;color:#333;text-align:left;margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px;font-family:'Space Mono',monospace;}
.historial{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.tick{font-size:18px;background:var(--card);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);}
#resultado{font-size:13px;color:var(--muted2);min-height:20px;font-family:'Space Mono',monospace;}

/* SLOTS */
.slots-machine{background:linear-gradient(135deg,#1a0a2e,#0f0a1e);border:2px solid #4c1d95;border-radius:20px;padding:24px;margin-bottom:14px;position:relative;overflow:hidden;}
.slots-lights{display:flex;justify-content:space-around;margin-bottom:14px;}
.slot-light{width:12px;height:12px;border-radius:50%;animation:blink 1s ease-in-out infinite alternate;}
.slot-light:nth-child(1){background:#fbbf24;box-shadow:0 0 8px #fbbf24;}
.slot-light:nth-child(2){background:#ef4444;box-shadow:0 0 8px #ef4444;animation-delay:.2s;}
.slot-light:nth-child(3){background:#22c55e;box-shadow:0 0 8px #22c55e;animation-delay:.4s;}
.slot-light:nth-child(4){background:#3b82f6;box-shadow:0 0 8px #3b82f6;animation-delay:.6s;}
.slot-light:nth-child(5){background:#fbbf24;box-shadow:0 0 8px #fbbf24;animation-delay:.8s;}
@keyframes blink{from{opacity:.3}to{opacity:1}}
.slots-title{font-size:17px;font-weight:800;text-align:center;color:#c084fc;letter-spacing:2px;margin-bottom:14px;text-transform:uppercase;}
.reels-wrap{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
.reel{width:88px;height:100px;background:#0a0a1a;border:2px solid #4c1d95;border-radius:12px;overflow:hidden;position:relative;box-shadow:inset 0 4px 16px rgba(0,0,0,.5);}
.reel-inner{position:absolute;top:0;left:0;width:100%;}
.reel-symbol{height:100px;display:flex;align-items:center;justify-content:center;font-size:50px;user-select:none;}
.reel::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,26,.85) 0%,transparent 22%,transparent 78%,rgba(10,10,26,.85) 100%);pointer-events:none;z-index:2;}
.reel-winner{border-color:var(--gold)!important;box-shadow:0 0 20px var(--gold)!important;}
.slots-win{text-align:center;font-size:20px;font-weight:800;min-height:28px;margin-bottom:10px;font-family:'Space Mono',monospace;}
.paytable{background:rgba(0,0,0,.4);border:1px solid #4c1d95;border-radius:10px;padding:10px;margin-bottom:12px;}
.paytable-title{font-size:11px;color:#a78bfa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-family:'Space Mono',monospace;}
.paytable-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(76,29,149,.3);font-size:12px;}
.paytable-row:last-child{border-bottom:none;}
.pt-syms{font-size:16px;letter-spacing:2px;}.pt-mult{color:var(--gold);font-family:'Space Mono',monospace;font-weight:700;}
.btn-spin{width:100%;p
